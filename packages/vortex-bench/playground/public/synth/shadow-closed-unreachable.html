<!doctype html>
<html lang="zh"><head><meta charset="utf-8"><title>closed shadow unreachable</title></head>
<body>
<h1>closed shadow 不可达(应优雅报错,非静默假成功)</h1>
<!-- closed shadow:el.shadowRoot 返回 null,ref/selector/evaluate 均无法进入(Web 平台设计)。
     vortex_act 对内部元素应抛明确错误码,而非 success:true 却无效果。 -->
<div id="host"></div>
<p data-testid="result">idle</p>
<script>
  const sr = document.getElementById("host").attachShadow({ mode: "closed" });
  sr.innerHTML = '<button id="cbtn" style="padding:8px">closed shadow 按钮</button>';
  sr.querySelector("#cbtn").addEventListener("click", () => {
    document.querySelector("[data-testid=result]").textContent = "closed-clicked";
  });
</script>
</body></html>
