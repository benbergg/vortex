<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>ep-login-cascader static</title></head><body>
<div id="app"><form class="el-form">
  <div class="el-form-item"><label>账号</label><div class="el-input"><input data-testid="user-input" placeholder="请输入账号"></div></div>
  <div class="el-form-item"><label>密码</label><div class="el-input"><input type="password" data-testid="pass-input" placeholder="请输入密码"></div></div>
  <div class="el-form-item"><label>机构</label><div class="el-cascader"><input readonly data-testid="org-cascader" placeholder="选择机构"></div></div>
  <div class="el-form-item"><label>权限</label>
    <div class="el-checkbox-group" data-testid="perms-group">
      <label class="el-checkbox"><input type="checkbox" value="read"><span>只读</span></label>
      <label class="el-checkbox"><input type="checkbox" value="write"><span>写入</span></label>
      <label class="el-checkbox"><input type="checkbox" value="admin"><span>管理员</span></label>
    </div>
  </div>
  <div class="el-form-item"><label class="el-checkbox"><input type="checkbox" data-testid="agree-check"><span>同意服务条款</span></label></div>
  <button type="button" class="el-button el-button--primary" data-testid="login-btn" disabled>登录</button>
</form></div></body></html>
