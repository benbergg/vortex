<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>ERP 商品管理 - Element Plus fixture</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>body { margin: 0; font-family: sans-serif; } #app { padding: 16px; } </style>
</head>
<body>
  <div id="app">
    <el-form :model="filter" inline>
      <el-form-item label="SKU">
        <el-input v-model="filter.sku" placeholder="搜索 SKU" data-testid="sku-input" />
      </el-form-item>
      <el-form-item label="状态">
        <el-select v-model="filter.status" placeholder="选择状态" data-testid="status-select">
          <el-option label="上架" value="online" />
          <el-option label="下架" value="offline" />
        </el-select>
      </el-form-item>
      <el-form-item label="创建时间">
        <el-date-picker v-model="filter.date" type="daterange" data-testid="date-range" />
      </el-form-item>
      <el-button type="primary" data-testid="search-btn" @click="onSearch">查询</el-button>
      <el-button data-testid="add-btn" @click="dialogVisible = true">新增商品</el-button>
    </el-form>

    <el-table :data="tableData" stripe style="margin-top: 16px">
      <el-table-column prop="sku" label="SKU" />
      <el-table-column prop="name" label="商品名称" />
      <el-table-column prop="price" label="价格" />
      <el-table-column label="操作">
        <template #default="scope">
          <el-button size="small" :data-testid="'edit-' + scope.row.sku">编辑</el-button>
          <el-button size="small" type="danger" :data-testid="'delete-' + scope.row.sku">删除</el-button>
        </template>
      </el-table-column>
    </el-table>

    <el-pagination layout="prev, pager, next" :total="100" style="margin-top: 16px" />

    <el-dialog v-model="dialogVisible" title="新增商品" width="480">
      <el-form :model="form" label-width="80">
        <el-form-item label="SKU"><el-input v-model="form.sku" data-testid="new-sku" /></el-form-item>
        <el-form-item label="名称"><el-input v-model="form.name" data-testid="new-name" /></el-form-item>
        <el-form-item label="价格"><el-input v-model="form.price" data-testid="new-price" /></el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="dialogVisible = false">取消</el-button>
        <el-button type="primary" data-testid="save-btn" @click="onSave">保存</el-button>
      </template>
    </el-dialog>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script>
    const { createApp, reactive, ref } = Vue;
    createApp({
      setup() {
        const filter = reactive({ sku: "", status: "", date: null });
        const form = reactive({ sku: "", name: "", price: "" });
        const dialogVisible = ref(false);
        const tableData = ref([
          { sku: "SKU-001", name: "iPhone 15", price: "5999" },
          { sku: "SKU-002", name: "MacBook Pro", price: "14999" },
          { sku: "SKU-003", name: "AirPods", price: "1299" },
        ]);
        const onSearch = () => console.log("search", filter);
        const onSave = () => { dialogVisible.value = false; };
        return { filter, form, dialogVisible, tableData, onSearch, onSave };
      },
    }).use(ElementPlus).mount("#app");
  </script>
</body>
</html>
