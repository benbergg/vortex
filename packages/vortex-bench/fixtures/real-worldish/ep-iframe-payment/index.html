<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>支付 - iframe fixture</title>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<style>body{margin:0;font-family:sans-serif}#app{max-width:600px;margin:40px auto}</style>
</head><body>
<div id="app">
  <h2>订单支付</h2>
  <el-form label-width="80">
    <el-form-item label="金额">¥299.00</el-form-item>
    <el-form-item label="方式">
      <el-radio-group v-model="pay" data-testid="pay-method">
        <el-radio value="wechat">微信</el-radio>
        <el-radio value="card">银行卡</el-radio>
      </el-radio-group>
    </el-form-item>
  </el-form>
  <iframe src="iframe-card.html" width="100%" height="200" data-testid="payment-frame" title="payment-frame"></iframe>
  <el-button type="primary" data-testid="confirm-pay">确认支付</el-button>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script>
  const { createApp, ref } = Vue;
  createApp({ setup(){ return { pay: ref("card") }; } }).use(ElementPlus).mount("#app");
</script>
</body></html>
