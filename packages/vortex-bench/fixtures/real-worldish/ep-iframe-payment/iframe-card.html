<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>card</title>
<style>body{margin:0;font-family:sans-serif;padding:16px}label{display:block;margin:8px 0 4px}input{width:100%;padding:8px;box-sizing:border-box}</style>
</head><body>
<form>
  <label>卡号</label><input data-testid="card-no" required placeholder="1234 5678 9012 3456">
  <label>CVV</label><input data-testid="card-cvv" required placeholder="123" maxlength="3">
  <label>有效期</label><input data-testid="card-exp" placeholder="MM/YY">
</form>
</body></html>
