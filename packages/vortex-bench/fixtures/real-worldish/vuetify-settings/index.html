<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Vuetify settings</title>
<link rel="stylesheet" href="https://unpkg.com/vuetify@3/dist/vuetify.min.css">
<style>body{margin:0}</style></head><body>
<v-app id="app">
  <v-main><v-container max-width="600">
    <h2>系统设置</h2>
    <v-switch v-model="dark" label="暗色模式" data-testid="dark-switch"></v-switch>
    <v-slider v-model="volume" label="音量" min="0" max="100" thumb-label data-testid="volume-slider"></v-slider>
    <v-autocomplete v-model="lang" :items="langs" label="语言" data-testid="lang-ac"></v-autocomplete>
    <v-expansion-panels>
      <v-expansion-panel><v-expansion-panel-title data-testid="adv-panel">高级选项</v-expansion-panel-title>
        <v-expansion-panel-text>
          <v-switch v-model="beta" label="启用 Beta" data-testid="beta-switch"></v-switch>
          <v-text-field v-model="endpoint" label="自定义端点" data-testid="endpoint-input"></v-text-field>
        </v-expansion-panel-text>
      </v-expansion-panel>
    </v-expansion-panels>
    <v-btn color="primary" data-testid="save-btn" class="mt-4">保存</v-btn>
  </v-container></v-main>
</v-app>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/vuetify@3/dist/vuetify.min.js"></script>
<script>
  const { createApp, ref } = Vue;
  const { createVuetify } = Vuetify;
  createApp({
    setup(){ return { dark: ref(false), volume: ref(60), lang: ref("zh"), langs: ["zh","en","ja"], beta: ref(false), endpoint: ref("") }; }
  }).use(createVuetify()).mount("#app");
</script></body></html>
