<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>vuetify-settings static</title></head><body>
<div id="app"><main>
  <h2>系统设置</h2>
  <label class="v-switch"><input type="checkbox" data-testid="dark-switch"><span>暗色模式</span></label>
  <label><span>音量</span><input type="range" min="0" max="100" value="60" data-testid="volume-slider"></label>
  <label><span>语言</span><input data-testid="lang-ac" placeholder="请选择语言"></label>
  <button type="button" data-testid="adv-panel">高级选项</button>
  <label class="v-switch"><input type="checkbox" data-testid="beta-switch"><span>启用 Beta</span></label>
  <label><span>自定义端点</span><input data-testid="endpoint-input"></label>
  <button type="button" data-testid="save-btn" class="v-btn v-btn--primary">保存</button>
</main></div></body></html>
