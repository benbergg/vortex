<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Ant Design dashboard fixture</title>
<link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css">
<style>body{margin:0;font-family:sans-serif}.layout{display:flex;min-height:100vh}.sider{width:200px;background:#001529;color:white;padding:16px}.content{flex:1;padding:24px;background:#f0f2f5}.menu a{display:block;color:white;padding:8px 0;text-decoration:none}</style>
</head><body>
<div class="layout">
  <aside class="sider">
    <div class="menu">
      <a href="#" data-testid="menu-home">首页</a>
      <a href="#" data-testid="menu-orders">订单</a>
      <a href="#" data-testid="menu-users">用户</a>
      <a href="#" data-testid="menu-settings">设置</a>
    </div>
  </aside>
  <main class="content">
    <div style="background:white;padding:16px;border-radius:4px">
      <h2>订单列表</h2>
      <form style="display:flex;gap:8px;margin-bottom:16px">
        <input placeholder="订单号" data-testid="order-search" style="padding:4px 8px">
        <select data-testid="order-status">
          <option value="">全部</option>
          <option value="paid">已支付</option>
          <option value="shipped">已发货</option>
        </select>
        <button type="button" data-testid="btn-search">查询</button>
        <button type="button" data-testid="btn-export">导出</button>
      </form>
      <table border="1" cellspacing="0" cellpadding="8" data-testid="order-table">
        <thead><tr><th>订单号</th><th>客户</th><th>金额</th><th>操作</th></tr></thead>
        <tbody>
          <tr><td>A001</td><td>张三</td><td>¥299</td><td><button data-testid="view-A001">查看</button><button data-testid="refund-A001">退款</button></td></tr>
          <tr><td>A002</td><td>李四</td><td>¥599</td><td><button data-testid="view-A002">查看</button><button data-testid="refund-A002">退款</button></td></tr>
        </tbody>
      </table>
      <nav style="margin-top:16px">
        <button data-testid="page-prev">上一页</button>
        <span>1 / 10</span>
        <button data-testid="page-next">下一页</button>
      </nav>
    </div>
  </main>
</div>
</body></html>
