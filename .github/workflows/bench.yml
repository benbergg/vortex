name: vortex-bench

# 说明：vortex-bench 依赖 "真实 Chrome + vortex 扩展已加载激活 + vortex-server ws 6800"。
# GitHub Actions 的 ubuntu-latest 默认没有这套环境。要让 CI 自动跑需额外工作：
#   - 用 Xvfb + chromium + 持久化 profile 加载 unpacked 扩展
#   - headless 模式下让 ws server 能被扩展 service worker 连上
#   - 处理 service worker 在空闲时休眠
# 这些不在 v1 范围内，所以本 workflow 使用 workflow_dispatch 手动触发，
# 待后续补 headless runner 后再改 `on: pull_request`。
#
# 本地跑：
#   packages/vortex-bench/scripts/bench-ci.sh
# 见 packages/vortex-bench/README.md 的 "CI 与回归防护" 章节。

on:
  workflow_dispatch:
    inputs:
      scenario_root:
        description: "Scenario root to run"
        required: true
        default: "packages/vortex-bench/scenarios/v1"
        type: string

jobs:
  bench-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remind about manual setup
        run: |
          cat <<'EOT'
          ⚠️  vortex-bench v1 在 CI 里需要真实 Chrome + extension + vortex-server。
          标准 ubuntu runner 无法直接跑。
          请在开发机本地运行：
            packages/vortex-bench/scripts/bench-ci.sh
          或 fork 加 headless runner（未来工作）。
          EOT
          exit 78  # neutral: neither success nor failure
